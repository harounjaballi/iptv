name: premium_iptv_player
description: "Premium IPTV Player — Lecteur IPTV professionnel (Android Mobile, Android TV, Google TV, Fire TV)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Réseau
  dio: ^5.5.0

  # Stockage local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.3
  file_picker: ^8.1.2

  # Lecteur vidéo (fork maintenu de better_player)
  better_player_plus: ^1.0.8

  # Lecteur premium : luminosité, volume système, Chromecast (CASTV2)
  screen_brightness: ^1.0.1
  flutter_volume_controller: ^1.3.2
  cast: ^2.1.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utilitaires
 intl: ^0.20.2
  equatable: ^2.0.5
  crypto: ^3.0.3
  flutter_cache_manager: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
